<!DOCTYPE html>
<html>
<head>
<title>Smart Calculator</title>

<style>
body{
    background: linear-gradient(135deg,#764ba2,#ee5253);
    font-family: Arial;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
}
.calculator{
    background:white;
    padding:25px;
    border-radius:20px;
    box-shadow:0 15px 40px rgba(0,0,0,0.4);
    width:350px;

    border: 4px solid transparent;
    border-image: linear-gradient(135deg, #667eea, #764ba2);
    border-image-slice: 1;
}



/* Bigger calculator */
.calculator{
    background:white;
    padding:25px;
    border-radius:20px;
    box-shadow:0 15px 40px rgba(0,0,0,0.4);
    width:350px;
}

/* Display area */
.display-box{
    position:relative;
}

#display{
    width:100%;
    height:55px;
    font-size:24px;
    text-align:right;
    padding:10px;
    border:2px solid #ddd;
    border-radius:10px;
}

/* Floating preview result */
#preview{
    position:absolute;
    bottom:5px;
    right:10px;
    font-size:14px;
    color:gray;
}

/* Buttons */
.buttons{
    margin-top:15px;
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:12px;
}

button{
    padding:16px;
    font-size:18px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    background:#f2f2f2;
    transition:0.2s;
}

button:hover{ background:#ddd; }

.operator{ background:#ff9f43; color:white; }
.equal{ background:#10ac84; color:white; }
.clear{ background:#ee5253; color:white; }
.cancel{ background:red; color:white; }

/* History */
.history{
    margin-top:15px;
    background:#f9f9f9;
    padding:10px;
    border-radius:10px;
    height:120px;
    overflow-y:auto;
}

.history h3{
    margin:0;
    font-size:16px;
}
</style>
</head>

<body>

<div class="calculator">

<div class="display-box">
<input type="text" id="display" disabled>
<div id="preview"></div>
</div>

<div class="buttons">
<button onclick="press('7')">7</button>
<button onclick="press('8')">8</button>
<button onclick="press('9')">9</button>
<button class="operator" onclick="press('/')">÷</button>

<button onclick="press('4')">4</button>
<button onclick="press('5')">5</button>
<button onclick="press('6')">6</button>
<button class="operator" onclick="press('*')">×</button>

<button onclick="press('1')">1</button>
<button onclick="press('2')">2</button>
<button onclick="press('3')">3</button>
<button class="operator" onclick="press('-')">−</button>

<button onclick="press('0')">0</button>
<button onclick="press('.')">.</button>
<button class="equal" onclick="calculate()">=</button>
<button class="operator" onclick="press('+')">+</button>

<button class="operator" onclick="press('%')">%</button>
<button class="operator" onclick="press('**')">^</button>
<button class="clear" onclick="clearDisplay()">C</button>
<button class="cancel" onclick="backspace()">⌫</button>
</div>

<div class="history">
<h3>History</h3>
<ul id="historyList"></ul>
</div>


<script>
let display = document.getElementById("display");
let preview = document.getElementById("preview");
let historyList = document.getElementById("historyList");

function press(value){
    display.value += value;
    updatePreview();
}

function clearDisplay(){
    display.value = "";
    preview.innerText = "";
}

function backspace(){
    display.value = display.value.slice(0, -1);
    updatePreview();
}

/* Live preview calculation */
function updatePreview(){
    try{
        if(display.value){
            let result = eval(display.value);
            preview.innerText = "= " + result;
        } else {
            preview.innerText = "";
        }
    } catch{
        preview.innerText = "";
    }
}

function calculate(){
    try{
        let expression = display.value;
        let result = eval(expression);
        display.value = result;
        preview.innerText = "";
        addHistory(expression, result);
    } catch{
        display.value = "Error";
        preview.innerText = "";
    }
}

function addHistory(expression, result){
    let li = document.createElement("li");
    li.textContent = expression + " = " + result;
    historyList.prepend(li);
}

/* Keyboard support */
document.addEventListener("keydown", function(event){
    if(!isNaN(event.key) || "+-*/.%".includes(event.key)){
        press(event.key);
    }
    if(event.key === "Enter"){ calculate(); }
    if(event.key === "Backspace"){ backspace(); }
    if(event.key === "Escape"){ clearDisplay(); }
});
</script>

</body>
</html>
